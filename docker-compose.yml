services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: funnelorders
      POSTGRES_PASSWORD: funnelorders
      POSTGRES_DB: funnelorders
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
